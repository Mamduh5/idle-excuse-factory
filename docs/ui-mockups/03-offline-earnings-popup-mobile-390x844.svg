      <text x="22" y="25" class="body ink" text-anchor="start">เวลาออฟไลน์ที่นับ: 1h 20m</text>
    </g>
    <g transform="translate(28 356)">
      <rect x="0" y="0" width="250" height="44" rx="18" fill="url(#buttonGrad)" stroke="#4e342e" stroke-width="2"/>
      <text x="125" y="28" class="buttonText ink" text-anchor="middle">รับทรัพย์</text>
    </g>
