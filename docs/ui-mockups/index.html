<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Idle Excuse Factory UI Mockups</title>
  <style>
    :root { color-scheme: light; --ink: #2b2018; --bg: #efe6d5; --card: #fffaf0; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans Thai", Tahoma, sans-serif; background: var(--bg); color: var(--ink); }
    header { padding: 28px 22px 12px; max-width: 1120px; margin: 0 auto; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    p { margin: 0; line-height: 1.5; }
    main { max-width: 1120px; margin: 0 auto; padding: 16px 22px 36px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 22px; }
    figure { margin: 0; background: var(--card); border: 2px solid #4e342e; border-radius: 22px; padding: 14px; box-shadow: 0 8px 24px rgba(43,32,24,.12); }
    figcaption { font-weight: 800; margin: 0 0 10px; }
    img { width: 100%; height: auto; display: block; border-radius: 16px; }
    code { background: #fff7e6; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>Idle Excuse Factory / โรงงานข้ออ้าง — UI Mockups</h1>
    <p>Repo-ready visual references for <code>docs/ui-mockups/</code>. Open this file locally to preview the SVG handoff.</p>
  </header>
  <main>
    <figure><figcaption>01 Main Factory Screen</figcaption><img src="01-main-factory-mobile-390x844.svg" alt="Main factory mobile UI mockup" /></figure>
    <figure><figcaption>02 Upgrades Modal</figcaption><img src="02-upgrades-modal-mobile-390x844.svg" alt="Upgrades modal mockup" /></figure>
    <figure><figcaption>03 Offline Earnings Popup</figcaption><img src="03-offline-earnings-popup-mobile-390x844.svg" alt="Offline earnings popup mockup" /></figure>
    <figure><figcaption>04 Layout Map</figcaption><img src="04-layout-map-390x844.svg" alt="Layout implementation map" /></figure>
  </main>
</body>
</html>
