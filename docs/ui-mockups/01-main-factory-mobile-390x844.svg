    <g transform="translate(105 14)"><rect x="0" y="0" width="68" height="42" rx="21.0" fill="#fffaf0" stroke="#2b2018" stroke-width="1.5"/><text x="34.0" y="25.0" class="small" fill="#2b2018" text-anchor="middle">Zones</text></g>
    <g transform="translate(184 14)"><rect x="0" y="0" width="78" height="42" rx="21.0" fill="#fffaf0" stroke="#2b2018" stroke-width="1.5"/><text x="39.0" y="25.0" class="small" fill="#2b2018" text-anchor="middle">Archive</text></g>
    <g transform="translate(278 14)"><rect x="0" y="0" width="54" height="42" rx="21.0" fill="#fffaf0" stroke="#2b2018" stroke-width="1.5"/><text x="27.0" y="25.0" class="small" fill="body" text-anchor="middle">⚙</text></g>
