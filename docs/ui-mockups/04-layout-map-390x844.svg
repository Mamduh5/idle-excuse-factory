    <rect x="18" y="78" width="294" height="34" rx="10" fill="#fffaf0" stroke="#6d4c41"/>
    <rect x="18" y="122" width="294" height="34" rx="10" fill="#fffaf0" stroke="#6d4c41"/>
    <rect x="18" y="166" width="294" height="26" rx="10" fill="#ead7aa"/>
  </g>
  <g transform="translate(58 414)">
