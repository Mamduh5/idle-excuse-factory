    <text x="18" y="34" class="h2 ink" text-anchor="start">ExcuseCounterView</text>
    <text x="18" y="58" class="small muted" text-anchor="start">stock / cap / value / locked or empty state</text>
    <rect x="18" y="78" width="294" height="28" rx="10" fill="#fffaf0" stroke="#6d4c41"/>
    <rect x="18" y="114" width="294" height="28" rx="10" fill="#fffaf0" stroke="#6d4c41"/>
    <rect x="18" y="150" width="294" height="18" rx="9" fill="#ead7aa"/>
  </g>
  <g transform="translate(58 606)">
    <rect x="0" y="0" width="330" height="146" rx="16" fill="#ffd6a5" stroke="#4e342e" stroke-width="2"/>
    <text x="18" y="34" class="h2 ink" text-anchor="start">CraftPanelView</text>
    <text x="18" y="58" class="small muted" text-anchor="start">buttons at least 44px; ready/crafting/full/locked</text>
    <rect x="18" y="76" width="294" height="44" rx="14" fill="#ffb84d" stroke="#4e342e"/>
  </g>
  <g transform="translate(58 766)">
    <rect x="0" y="0" width="330" height="58" rx="16" fill="#4a2c22"/>
    <text x="18" y="34" class="small lightText" text-anchor="start">Footer: Upgrades / Zones / Archive / Settings</text>
  </g>

</svg>
